# Cloudflare Worker that triggers the "Update World Cup data" GitHub Actions
# workflow every minute. GitHub throttles its own `schedule:` cron heavily
# (runs landed ~3-4h apart instead of every 5 min), but workflow_dispatch via
# the REST API is not throttled — so this Worker fires a reliable 1-min trigger.
#
# Deploy:  see README.md  (needs the GH_TOKEN secret set first)
name = "wc-data-trigger"
main = "src/index.js"
compatibility_date = "2026-06-11"

# The Worker wakes every minute, but only *dispatches a run* every minute while
# a match is in progress, and every IDLE_EVERY_MIN minutes otherwise (see
# src/index.js). Waking every minute is free; this just decides when to trigger.
[triggers]
crons = ["* * * * *"]

# Non-secret config (override here without touching code). The GitHub token is
# NOT here — it's a secret, set with `wrangler secret put GH_TOKEN`.
[vars]
OWNER = "mirghanbari"
REPO = "dashboards"
WORKFLOW = "update-data.yml"
REF = "main"
MATCHES_URL = "https://raw.githubusercontent.com/mirghanbari/dashboards/main/world-cup/src/data/matches.json"
IDLE_EVERY_MIN = "30"     # dispatch cadence when no match is on
PRE_KICKOFF_MIN = "5"     # switch to 1/min this long before kickoff
MATCH_WINDOW_MIN = "165"  # treat as in-progress up to 2h45m after kickoff
