# Builds the World Cup dashboard and deploys it to GitHub Pages.
# NOTE: GitHub Actions only runs workflows from `.github/workflows/` at the REPO
# ROOT. If this project lives in a subfolder, copy this file (and update-data.yml)
# to <repo>/.github/workflows/ for them to run. See world-cup/README.md.
name: Deploy World Cup dashboard

on:
  push:
    branches: [main]
    paths: ["world-cup/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: world-cup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: world-cup/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: world-cup/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
