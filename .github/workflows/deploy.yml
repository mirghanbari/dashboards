# Builds the World Cup dashboard (in world-cup/) and deploys it to GitHub Pages.
# Lives at the repo root because GitHub only runs workflows from /.github/workflows.
name: Deploy World Cup dashboard

on:
  push:
    branches: [main]
    paths:
      - "world-cup/**"
      - ".github/workflows/deploy.yml"
  # Redeploy after a scheduled data refresh — commits made by the Actions bot
  # with GITHUB_TOKEN don't trigger `push`, so we chain off the data workflow.
  workflow_run:
    workflows: ["Update World Cup data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, queueing newer runs behind it. We do NOT
# cancel in-progress runs: a cancelled run can leave a half-submitted Pages
# deployment that the next run collides with ("in progress deployment" 400).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: world-cup
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: world-cup/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: world-cup/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
