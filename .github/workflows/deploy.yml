# Builds the World Cup dashboard (in world-cup/) and deploys it to GitHub Pages.
# Lives at the repo root because GitHub only runs workflows from /.github/workflows.
name: Deploy World Cup dashboard

on:
  push:
    branches: [main]
    paths:
      - "world-cup/**"
      - ".github/workflows/deploy.yml"
  # Redeploy after a scheduled data refresh — commits made by the Actions bot
  # with GITHUB_TOKEN don't trigger `push`, so we chain off the data workflow.
  # Only *successful* update-data runs are worth a deploy; the job `if` below
  # filters out the cancelled ones (the live-cadence dispatch leaves pending runs
  # that cancel-in-progress:false then cancels — each would otherwise fire a
  # pointless deploy and add to the Pages "in progress deployment" collisions).
  workflow_run:
    workflows: ["Update World Cup data"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, queueing newer runs behind it. We do NOT
# cancel in-progress runs: a cancelled run can leave a half-submitted Pages
# deployment that the next run collides with ("in progress deployment" 400).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Skip deploys chained off a cancelled/failed data refresh; push and manual
    # dispatch always proceed (they carry no workflow_run payload). `deploy`
    # needs `build`, so skipping here skips the whole deploy.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: world-cup
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: world-cup/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: world-cup/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
