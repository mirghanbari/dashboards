# Refreshes the World Cup dataset from ESPN's public API on a schedule, commits
# any changed JSON, and lets the deploy workflow redeploy. No API key required.
# Lives at the repo root because GitHub only runs workflows from /.github/workflows.
name: Update World Cup data

on:
  schedule:
    # Only during the tournament (UTC): Jun 11–30 and Jul 1–19, 2026. Before
    # opening day there's nothing to refresh, so the job stays idle.
    - cron: "*/30 * 11-30 6 *"
    - cron: "*/30 * 1-19 7 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: world-cup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: world-cup/package-lock.json
      - run: npm ci
      - name: Refresh World Cup data from ESPN
        run: npm run ingest
      - name: Enrich with advanced stats from FotMob
        # Runs after the ESPN step (it enriches the players.json ESPN builds).
        # Non-fatal: if FotMob's API hiccups, still commit the ESPN refresh.
        continue-on-error: true
        run: npm run ingest:fotmob
      - name: Refresh International Friendlies from ESPN
        run: npm run ingest:friendlies
      - name: Commit updated data
        run: |
          git config user.name "world-cup-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain src/data)" ]; then
            git add src/data
            git commit -m "data: refresh World Cup + friendlies data"
            git push
          else
            echo "No data changes."
          fi
