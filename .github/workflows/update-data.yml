# Refreshes the World Cup dataset from ESPN's public API on a schedule, commits
# any changed JSON, and lets the deploy workflow redeploy. No API key required.
# Lives at the repo root because GitHub only runs workflows from /.github/workflows.
name: Update World Cup data

on:
  schedule:
    # Every 30 minutes (UTC). Tighten/loosen as the schedule demands.
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: world-cup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: world-cup/package-lock.json
      - run: npm ci
      - name: Refresh World Cup data from ESPN
        run: npm run ingest
      - name: Refresh International Friendlies from ESPN
        run: npm run ingest:friendlies
      - name: Commit updated data
        run: |
          git config user.name "world-cup-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain src/data)" ]; then
            git add src/data
            git commit -m "data: refresh World Cup data [skip ci]"
            git push
          else
            echo "No data changes."
          fi
