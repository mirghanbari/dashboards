<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnum, P.I. — Top 25 Episodes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="aloha-stripe"></div>

  <header class="hero">
    <div class="hero-inner">
      <p class="kicker">1980 – 1988 · The Original Series</p>
      <h1>Magnum, <span class="pi">P.I.</span></h1>
      <p class="tagline">The 25 Best Episodes <span class="dash">—</span> ranked &amp; scored</p>
    </div>
  </header>

  <main>
    <section class="stats" id="stats" aria-label="Summary statistics"></section>

    <section class="controls">
      <div class="search-wrap">
        <span class="search-ico" aria-hidden="true">⌕</span>
        <input id="search" type="search" placeholder="Search episodes or synopses…" autocomplete="off" />
      </div>
      <div class="control-group">
        <label for="sort">Sort</label>
        <select id="sort">
          <option value="rank">By Rank</option>
          <option value="score">By Score (high → low)</option>
          <option value="season">By Season</option>
          <option value="title">By Title (A → Z)</option>
        </select>
      </div>
      <div class="season-filters" id="seasonFilters" aria-label="Filter by season"></div>
    </section>

    <section class="grid" id="grid" aria-live="polite"></section>
    <p class="empty" id="empty" hidden>No episodes match your search.</p>
  </main>

  <footer class="site-footer">
    <p><strong>Scoring:</strong> composite 10-point scale blending IMDb fan ratings with critical consensus.</p>
    <p class="sources">Sources: episode.ninja · Wikipedia · ScreenRant · AV Club · IMDb</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
